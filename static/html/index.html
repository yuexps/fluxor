<!DOCTYPE html>
<html lang="zh-CN">
<head>

                        <polyline points="18 17 13 12 18 7"></polyline>
                    </svg>
                    <svg class="icon-expand" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                        <polyline points="13 17 18 12 13 7"></polyline>
                        <polyline points="6 17 11 12 6 7"></polyline>
                    </svg>
                </button>
            </div>

            <nav class="sidebar-nav">

                    <span class="nav-label">订阅</span>
                </a>
                <a href="#" data-page="rules" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>

                </a>

                </button>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">

                            <text x="12" y="16" font-size="14" text-anchor="middle" fill="currentColor" stroke="none">A</text>

    <script src="{{.BaseURL}}/static/js/i18n.js"></script>
